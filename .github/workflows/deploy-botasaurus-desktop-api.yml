name: Build and Deploy Botasaurus Desktop API

on:
  push:
    branches: [ master ]
    paths:
      - 'js/botasaurus-desktop-api/**'

jobs:
  build-and-deploy:
    permissions:
      contents: write
      id-token: write # Required for npm trusted publishing (OIDC)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        persist-credentials: false
        fetch-depth: 0

    # NOTE: do NOT set `registry-url` here. It makes setup-node write a
    # `_authToken=${NODE_AUTH_TOKEN}` line to .npmrc, which short-circuits the
    # OIDC handshake and makes `npm publish` fail with a misleading 404.
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24

    - name: Upgrade npm (trusted publishing requires npm >= 11.5.1)
      run: npm install -g npm@latest

    - name: Install dependencies and build
      working-directory: js/botasaurus-desktop-api
      run: |
        npm i
        npm run upload

    - name: Pull Changes
      run: |
        git pull

    - name: Commit & Push changes
      uses: actions-js/push@master
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        branch: master